<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Training">
<meta name="theme-color" content="#0C447C">
<title>Mijn Training</title>
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f5;
    --bg3: #eeeeee;
    --text: #111111;
    --text2: #555555;
    --text3: #999999;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --blue: #0C447C;
    --blue-light: #E6F1FB;
    --blue-mid: #378ADD;
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --green-dark: #085041;
    --radius: 10px;
    --radius-lg: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #121212;
      --bg2: #1e1e1e;
      --bg3: #2a2a2a;
      --text: #f0f0f0;
      --text2: #aaaaaa;
      --text3: #666666;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
      --blue-light: #0a2540;
      --green-light: #0a2e22;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); max-width: 480px; margin: 0 auto; min-height: 100vh; }
  .header { padding: env(safe-area-inset-top, 12px) 16px 12px; background: var(--bg); border-bottom: 0.5px solid var(--border); position: sticky; top: 0; z-index: 10; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .app-title { font-size: 20px; font-weight: 600; color: var(--text); }
  .date-lbl { font-size: 12px; color: var(--text3); }
  .day-tabs { display: flex; gap: 5px; }
  .day-tab { flex: 1; padding: 8px 2px; border-radius: var(--radius); border: 0.5px solid var(--border); background: var(--bg); cursor: pointer; font-size: 12px; color: var(--text2); text-align: center; font-family: inherit; transition: all 0.15s; }
  .day-tab.active { background: var(--blue); border-color: var(--blue); color: white; font-weight: 600; }
  .day-tab.training { border-color: var(--blue-mid); color: var(--blue); }
  .day-tab.active.training { color: white; }
  .prog-wrap { padding: 12px 16px 4px; }
  .prog-top { display: flex; justify-content: space-between; font-size: 12px; color: var(--text3); margin-bottom: 5px; }
  .prog-bar { height: 4px; background: var(--bg3); border-radius: 2px; }
  .prog-fill { height: 4px; background: var(--green); border-radius: 2px; transition: width 0.4s ease; }
  .ex-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px)); }
  .ex-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; transition: border-color 0.2s; }
  .ex-card.done { border-color: var(--green); }
  .ex-head { display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; user-select: none; }
  .ex-thumb { width: 54px; height: 54px; flex-shrink: 0; border-radius: var(--radius); background: var(--bg2); display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .ex-thumb svg { width: 50px; height: 50px; }
  .ex-info { flex: 1; min-width: 0; }
  .ex-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .ex-meta { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .ex-bench { font-size: 11px; color: var(--blue-mid); margin-top: 3px; }
  .ex-done { font-size: 11px; color: var(--green); margin-top: 3px; font-weight: 500; }
  .chev { font-size: 18px; color: var(--text3); transition: transform 0.2s; flex-shrink: 0; }
  .chev.open { transform: rotate(180deg); }
  .ex-body { border-top: 0.5px solid var(--border); padding: 14px; display: none; }
  .ex-body.open { display: block; }
  .ex-visual { width: 100%; height: 120px; background: var(--bg2); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
  .ex-visual svg { width: 210px; height: 105px; }
  .instr { font-size: 13px; color: var(--text2); line-height: 1.65; margin-bottom: 12px; padding: 10px 12px; background: var(--bg2); border-radius: var(--radius); }
  .sets-hdr { display: grid; grid-template-columns: 26px 1fr 1fr 36px; gap: 6px; margin-bottom: 5px; }
  .sets-hdr span { font-size: 10px; color: var(--text3); text-align: center; text-transform: uppercase; letter-spacing: 0.05em; }
  .set-row { display: grid; grid-template-columns: 26px 1fr 1fr 36px; gap: 6px; align-items: center; margin-bottom: 6px; }
  .set-num { font-size: 13px; color: var(--text3); text-align: center; font-weight: 500; }
  .s-input { padding: 8px 6px; font-size: 14px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); width: 100%; text-align: center; font-family: inherit; -webkit-appearance: none; }
  .s-input::placeholder { color: var(--text3); }
  .s-input:focus { outline: none; border-color: var(--blue-mid); }
  .s-input.filled { border-color: var(--blue-mid); background: var(--blue-light); }
  .s-check { width: 36px; height: 36px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.15s; }
  .s-check.on { background: var(--green-light); border-color: var(--green); color: var(--green-dark); }
  .hist-block { margin-top: 12px; padding-top: 12px; border-top: 0.5px solid var(--border); }
  .hist-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
  .hist-row { font-size: 12px; color: var(--text2); padding: 4px 0; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; }
  .hist-row:last-child { border-bottom: none; }
  .hist-done { color: var(--green); font-size: 11px; }
  .rest-day { padding: 60px 16px; text-align: center; color: var(--text3); }
  .rest-icon { font-size: 48px; margin-bottom: 12px; }
  .rest-title { font-size: 18px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
  .rest-sub { font-size: 14px; line-height: 1.6; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="app-title">💪 Mijn training</span>
    <span class="date-lbl" id="dlbl"></span>
  </div>
  <div class="day-tabs" id="dtabs"></div>
</div>

<div class="prog-wrap" id="pwrap" style="display:none">
  <div class="prog-top"><span id="ptyp" style="font-weight:500;color:var(--text2)"></span><span id="ppct"></span></div>
  <div class="prog-bar"><div class="prog-fill" id="pfill" style="width:0%"></div></div>
</div>

<div id="main"></div>

const KEY_PREFIX='ft_';
let dag=0;
const mem={};

function sk(d,e,s,f){return KEY_PREFIX+'d'+d+'_e'+e+'_s'+s+'_'+f;}
function lsGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}

function getVal(d,e,s,f){return mem[sk(d,e,s,f)]||lsGet(sk(d,e,s,f))||'';}
function setVal(d,e,s,f,v){mem[sk(d,e,s,f)]=v;lsSet(sk(d,e,s,f),v);}
function isDone(d,e,s){return lsGet(sk(d,e,s,'done'))==='1';}

function histKey(d,e){return KEY_PREFIX+'hist_d'+d+'_e'+e;}
function getHist(d,e){try{return JSON.parse(lsGet(histKey(d,e))||'[]');}catch(x){return[];}}
function saveHist(d,e,data){lsSet(histKey(d,e),JSON.stringify(data));}

function recordSet(d,e,s,f,v){
  setVal(d,e,s,f,v);
  const today=new Date().toLocaleDateString('nl-NL');
  const hist=getHist(d,e);
  const idx=hist.findIndex(x=>x.date===today&&x.set===s);
  const kg=f==='kg'?v:getVal(d,e,s,'kg');
  const reps=f==='reps'?v:getVal(d,e,s,'reps');
  if(idx>=0){hist[idx].kg=kg;hist[idx].reps=reps;}
  else hist.push({date:today,set:s,kg,reps,done:isDone(d,e,s)});
  saveHist(d,e,hist);
}

function recordDone(d,e,s,val){
  lsSet(sk(d,e,s,'done'),val?'1':'0');
  const today=new Date().toLocaleDateString('nl-NL');
  const hist=getHist(d,e);
  const idx=hist.findIndex(x=>x.date===today&&x.set===s);
  if(idx>=0)hist[idx].done=val;
  else hist.push({date:today,set:s,kg:getVal(d,e,s,'kg'),reps:getVal(d,e,s,'reps'),done:val});
  saveHist(d,e,hist);
}

function getBench(d,e){
  const hist=getHist(d,e);
  const today=new Date().toLocaleDateString('nl-NL');
  const dates=[...new Set(hist.map(x=>x.date))].filter(dt=>dt!==today).sort();
  if(!dates.length)return null;
  const last=dates[dates.length-1];
  return{date:last,entries:hist.filter(x=>x.date===last)};
}

function pct(sk){
  const o=SCHEMA[sk];if(!o)return 0;
  let t=0,g=0;
  o.forEach((ex,i)=>{for(let s=0;s<ex.sets;s++){t++;if(isDone(sk,i,s))g++;}});
  return t?Math.round(g/t*100):0;
}

function toggleEx(i){
  const b=document.getElementById('eb'+i),c=document.getElementById('ec'+i);
  const open=b.classList.contains('open');
  document.querySelectorAll('.ex-body').forEach(x=>x.classList.remove('open'));
  document.querySelectorAll('.chev').forEach(x=>x.classList.remove('open'));
  if(!open){b.classList.add('open');c.classList.add('open');}
}

function toggleDone(d,e,s){
  const was=isDone(d,e,s);
  recordDone(d,e,s,!was);
  const btn=document.getElementById('sc'+e+'-'+s);
  if(btn){btn.className='s-check'+(!was?' on':'');btn.innerHTML=!was?'✓':'';}
  const card=document.getElementById('exc'+e);
  if(card){const all=SCHEMA[d][e]&&[...Array(SCHEMA[d][e].sets)].every((_,si)=>isDone(d,e,si));card.className='ex-card'+(all?' done':'');}
  renderProg();
}

function renderProg(){
  const pw=document.getElementById('pwrap');
  const d=DAGEN[dag];
  if(!d.t){pw.style.display='none';return;}
  pw.style.display='block';
  const p=pct(d.sk);
  document.getElementById('ptyp').textContent=d.type;
  document.getElementById('ppct').textContent=p+'%';
  document.getElementById('pfill').style.width=p+'%';
}

function renderTabs(){
  const w=document.getElementById('dtabs');w.innerHTML='';
  DAGEN.forEach((d,i)=>{
    const b=document.createElement('button');
    b.className='day-tab'+(i===dag?' active':'')+(d.t?' training':'');
    b.textContent=d.k;b.onclick=()=>{dag=i;render();};
    w.appendChild(b);
  });
}

function render(){
  renderTabs();
  const now=new Date();
  document.getElementById('dlbl').textContent=now.toLocaleDateString('nl-NL',{weekday:'short',day:'numeric',month:'short'});
  const main=document.getElementById('main');
  const d=DAGEN[dag];
  if(!d.t){
    document.getElementById('pwrap').style.display='none';
    main.innerHTML=`<div class="rest-day"><div class="rest-icon">🌙</div><div class="rest-title">Rustdag</div><div class="rest-sub">Herstel is een essentieel onderdeel van training. Eet goed, slaap goed.</div></div>`;
    return;
  }
  renderProg();
  const oefs=SCHEMA[d.sk];
  let html='<div class="ex-list">';
  oefs.forEach((o,i)=>{
    const allDone=[...Array(o.sets)].every((_,s)=>isDone(d.sk,i,s));
    const bench=getBench(d.sk,i);
    let benchHtml='';
    if(bench){
      const sets=bench.entries.filter(x=>x.kg||x.reps);
      if(sets.length){
        const sum=sets.map(x=>`s${x.set+1}: ${x.kg||'–'}kg×${x.reps||'–'}`).join(' · ');
        benchHtml=`<div class="ex-bench">⏱ ${bench.date}: ${sum}</div>`;
      }
    }
    html+=`<div class="ex-card${allDone?' done':''}" id="exc${i}">
      <div class="ex-head" onclick="toggleEx(${i})">
        <div class="ex-thumb">${o.svg}</div>
        <div class="ex-info">
          <div class="ex-name">${o.n}</div>
          <div class="ex-meta">${o.sets} sets · ${o.reps} reps · ${o.mat}</div>
          ${benchHtml}
          ${allDone?'<div class="ex-done">✓ Voltooid</div>':''}
        </div>
        <span class="chev" id="ec${i}">›</span>
      </div>
      <div class="ex-body" id="eb${i}">
        <div class="ex-visual">${o.svg}</div>
        <div class="instr">${o.instr}</div>
        <div class="sets-hdr"><span>#</span><span>Gewicht (kg)</span><span>Herhalingen</span><span></span></div>`;
    for(let s=0;s<o.sets;s++){
      const done=isDone(d.sk,i,s);
      const kg=getVal(d.sk,i,s,'kg');
      const reps=getVal(d.sk,i,s,'reps');
      const b=getBench(d.sk,i);
      const bs=b?b.entries.find(x=>x.set===s):null;
      html+=`<div class="set-row">
        <div class="set-num">${s+1}</div>
        <input class="s-input${kg?' filled':''}" type="number" inputmode="decimal" min="0" step="0.5" placeholder="${bs&&bs.kg?bs.kg+'kg':'–'}" value="${kg}" oninput="recordSet(${d.sk},${i},${s},'kg',this.value);this.classList.toggle('filled',!!this.value)" aria-label="Gewicht set ${s+1}">
        <input class="s-input${reps?' filled':''}" type="number" inputmode="numeric" min="0" step="1" placeholder="${bs&&bs.reps?bs.reps+'×':'–'}" value="${reps}" oninput="recordSet(${d.sk},${i},${s},'reps',this.value);this.classList.toggle('filled',!!this.value)" aria-label="Reps set ${s+1}">
        <button class="s-check${done?' on':''}" id="sc${i}-${s}" onclick="toggleDone(${d.sk},${i},${s})" aria-label="Set afvinken">${done?'✓':''}</button>
      </div>`;
    }
    if(bench&&bench.entries.length){
      html+=`<div class="hist-block"><div class="hist-lbl">📅 Vorige training (${bench.date})</div>`;
      bench.entries.filter(x=>x.kg||x.reps).forEach(x=>{
        html+=`<div class="hist-row"><span>Set ${x.set+1}: ${x.kg||'–'} kg × ${x.reps||'–'} reps</span><span class="hist-done">${x.done?'✓':''}</span></div>`;
      });
      html+='</div>';
    }
    html+='</div></div>';
  });
  html+='</div>';
  main.innerHTML=html;
}

const today=new Date().getDay();
const map={1:0,3:2,6:5};
dag=map[today]!==undefined?[0,2,4,6].includes(today)?0:map[today]||0:0;
if(map[today]!==undefined)dag=[0,1,2,3,4,5,6].indexOf(today);
dag=today===1?0:today===3?2:today===6?5:0;
render();
</script>
